services:
  postgres:
    image: postgres:16-alpine
    container_name: drclimat-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: drclimat
      POSTGRES_PASSWORD: drclimat_secret
      POSTGRES_DB: drclimat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
